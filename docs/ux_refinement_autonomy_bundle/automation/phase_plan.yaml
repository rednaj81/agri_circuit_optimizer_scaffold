mode: ux_refinement
max_waves: 10
stop_after_consecutive_low_value: 3
final_polish_cycles: 1

phases:
  - id: ux_phase_1
    name: Navigation and information architecture cleanup
    focus:
      - main navigation
      - screen purpose clarity
      - reduction of noisy technical surfaces
      - market-grade product shell
    expected_outcomes:
      - clearer IA
      - fewer ambiguous entry points
      - better main user path
      - less console-like feel

  - id: ux_phase_2
    name: Studio refinement and connectivity-first workflow
    focus:
      - business graph only
      - route-first canvas
      - node/edge editing UX
      - direct manipulation on canvas
      - properties panel
      - mandatory routes
      - optional and desirable routes
      - route particularities
      - pre-run validation
      - connectivity guidance
    expected_outcomes:
      - scenario readiness clarity
      - fewer preventable invalid runs
      - studio no longer exposes technical graph internals
      - first Studio surface centered on routes to be served, not strategic helper entities

  - id: ux_phase_3
    name: Runs queue and execution UX
    focus:
      - queue readability
      - run statuses
      - progress
      - run detail view
      - scenario/run separation
    expected_outcomes:
      - clean understanding of background processing

  - id: ux_phase_4
    name: Decision view and technical tie support
    focus:
      - official candidate
      - runner-up
      - side-by-side comparison
      - technical tie
      - manual final choice
    expected_outcomes:
      - clearer decision-making
      - final view focused on business-relevant topology only

  - id: ux_phase_5
    name: Polish, consistency and documentation
    focus:
      - labels
      - empty states
      - consistency
      - docs
      - validation checklist
    expected_outcomes:
      - professional finish

