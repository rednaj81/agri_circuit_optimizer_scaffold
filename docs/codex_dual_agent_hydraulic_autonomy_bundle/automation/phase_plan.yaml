phase_0:
  target: "Garantir Julia-only no caminho oficial e documentação honesta"
  status: "closed"
  closure_mode: "frozen_after_wave_7"
  next_phase_id: "phase_1"
  exit_criteria:
    - "engine oficial falha fechado sem Julia"
    - "README e docs coerentes"
  canonical_validation_profiles:
    - "official_preflight"
    - "official"
    - "diagnostic"
    - "diagnostic_comparison"
  phase_exit_checklist:
    - "`official_preflight` deve permanecer `validation_flow=preflight`, `validation_sufficiency=triage_only` e `official_gate_complete=false`."
    - "`official` deve permanecer o unico gate completo Julia-only com `validation_flow=full`, `validation_sufficiency=official_evidence`, `official_gate_complete=true`, `execution_mode=official`, `official_gate_valid=true` e `engine_used=watermodels_jl`."
    - "`diagnostic` deve permanecer nao oficial com `validation_flow=full`, `validation_sufficiency=diagnostic_evidence`, `official_gate_complete=false`, `execution_mode=diagnostic`, `official_gate_valid=false` e sem `engine_comparison.json`."
    - "`diagnostic_comparison` deve permanecer nao oficial com `validation_flow=full`, `validation_sufficiency=diagnostic_evidence`, `official_gate_complete=false`, `execution_mode=diagnostic`, `official_gate_valid=false` e `engine_comparison.json` obrigatorio."
    - "README e `docs/2026-04-03_handoff_decision_platform_runtime.md` devem apontar para este checklist como fonte unica de saida da phase_0."
  closure_handoff:
    summary_doc: "docs/2026-04-03_handoff_decision_platform_runtime.md"
    freeze_rule: "Nao reinterpretar `official_preflight` como gate completo e nao reinterpretar `diagnostic*` como evidencia oficial."
    transition_note: "A phase_1 pode iniciar sobre esta base congelada sem reabrir a semantica do gate Julia-only."
phase_1:
  target: "Normalizar domínio, persistência e cenários"
  status: "closed"
  closure_mode: "sealed_after_wave_7_regression_fix"
  next_phase_id: "phase_2"
  exit_criteria:
    - "cenários versionáveis"
    - "catálogo de componentes persistido"
  canonical_acceptance_target: "tests/decision_platform/test_phase1_exit_acceptance.py"
  phase_exit_checklist:
    - 'Executar `$env:PYTHONPATH=''src;.''; .\.venv\Scripts\python.exe -m pytest tests/decision_platform/test_scenario_settings_contract.py tests/decision_platform/test_scenario_persistence.py tests/decision_platform/test_phase1_exit_acceptance.py tests/decision_platform/test_phase1_exit_artifacts.py -q --basetemp tests/_tmp/pytest-basetemp-wave7-exit-artifacts` como gate reproduzivel e objetivo da fase.'
    - 'O gate acima deve permanecer reproduzível no codebase local sem limpeza manual prévia de `tests/_tmp`.'
    - 'Usar `docs/codex_dual_agent_runtime/phase_0_validation_manifest.json` no bloco `phase_1_exit_validation`, `docs/codex_dual_agent_runtime/supervisor_guidance.json` e `docs/2026-04-05_phase1_wave5_exit_handoff.md` como fonte única de saída operacional da phase_1.'
    - 'O bundle oficial `data/decision_platform/maquete_v2` deve continuar canônico, versionável e rastreável via `scenario_bundle.yaml`, `component_catalog.csv`, `scenario_bundle_manifest` e `scenario_bundle_files`.'
    - 'Os entrypoints oficiais (`run_decision_pipeline` e `save_and_reopen_local_bundle`) devem continuar falhando fechado para layout legado sem manifesto.'
    - 'As suítes de contrato já endurecidas (`test_loaders.py`, `test_scenario_contract_validation.py`, `test_component_catalog_contract.py`, `test_scenario_settings_contract.py`) permanecem como sustentação da saída, não como tema reaberto.'
    - 'Nenhuma nova wave funcional deve ocorrer dentro da phase_1 após a correção final da regressão operacional de fechamento.'
    - 'O redirecionamento histórico para `phase_2` já foi consumido; a continuidade funcional ativa agora está em `phase_3`, nunca em uma reabertura de `phase_1`.'
    - 'Após esta trilha operacional, `phase_1` permanece apenas como baseline histórica selada; não abrir novas waves, nem mesmo correções operacionais de baixo valor, fora de justificativa extraordinária.'
    - 'Após esta onda final de encerramento, qualquer exceção deve se limitar a correção crítica de integridade de evidências; continuidade normal segue apenas em `phase_3`.'
    - 'A parada desta trilha fica registrada por 3 ondas consecutivas de baixo valor segundo o Auditor; não prolongar `phase_1` além deste ponto.'
  closure_handoff:
    summary_doc: "docs/2026-04-05_phase1_wave5_exit_handoff.md"
    freeze_rule: "Phase_2 deve consumir o bundle canônico como baseline congelado; não reabrir persistência, catálogo, rotas, settings, topologia ou layout sem novo handoff objetivo."
    transition_note: "A phase_1 esta encerrada como baseline selada e referência histórica; o redirecionamento histórico abriu a phase_2 e a continuidade funcional ativa agora reside na phase_3, nunca em nova onda funcional nem em nova correção operacional de baixo valor dentro da phase_1."
    post_close_exception_policy: "critical_evidence_integrity_only"
    stop_trigger: "three_consecutive_low_value_auditor_waves"
phase_2:
  target: "Entregar studio de nós e arestas"
  status: "closed"
  closure_mode: "sealed_after_wave_5_exit_gate"
  next_phase_id: "phase_3"
  activation_mode: "explicit_open_after_phase_1_closeout"
  activation_note: "Studio estrutural pertence à phase_2 e não deve voltar a contaminar o gate congelado da phase_1."
  canonical_acceptance_target: "tests/decision_platform/test_phase2_exit_acceptance.py"
  exit_criteria:
    - "nós editáveis"
    - "arestas editáveis"
    - "salvar/reabrir cenário"
  phase_exit_checklist:
    - 'Executar `tests/decision_platform/test_phase2_exit_acceptance.py` como gate único da baseline congelada do Studio.'
    - 'Usar `docs/2026-04-05_phase2_exit.md` e `docs/2026-04-05_phase2_to_phase3_handoff.md` como fechamento e transição explícita da phase_2.'
    - 'Não reabrir autoria estrutural, save/reopen canônico ou contratos referenciais de nós/arestas sem novo handoff objetivo.'
  closure_handoff:
    summary_doc: "docs/2026-04-05_phase2_exit.md"
    freeze_rule: "A phase_3 deve consumir o Studio atual como baseline fechada e não como UI em expansão implícita."
    transition_note: "A continuidade funcional segue em phase_3 com fila serial e runs isoladas."
phase_3:
  target: "Fila e background runs"
  status: "in_progress"
  opening_mode: "serial_queue_mvp"
  current_acceptance_target: "tests/decision_platform/test_phase3_queue_acceptance.py"
  current_handoff: "docs/2026-04-05_phase3_wave1_queue_open_handoff.md"
  supporting_handoffs:
    - "docs/2026-04-05_phase2_to_phase3_handoff.md"
    - "docs/2026-04-05_phase3_wave2_run_operations_handoff.md"
  phase_entry_checklist:
    - 'Usar `tests/decision_platform/test_phase3_queue_acceptance.py` como aceite funcional atual do corte mínimo da fila serial.'
    - 'Usar `docs/2026-04-05_phase3_wave1_queue_open_handoff.md` como handoff humano único de abertura operacional da phase_3.'
    - 'Tratar `phase_1` e `phase_2` como fechadas; não reabrir persistência canônica nem baseline do Studio enquanto a fila serial evolui.'
    - 'Referenciar `docs/2026-04-05_phase1_wave5_exit_handoff.md` apenas como baseline histórica selada, não como escopo funcional reaberto.'
    - 'Qualquer continuidade futura deve seguir somente na phase_3; não abrir novas waves de phase_1 como mecanismo de manutenção rotineira.'
  current_scope:
    - "run_job persistido localmente com estados canônicos"
    - "worker serial explícito sem simultaneidade no MVP"
    - "diretório isolado por run com log, eventos e artefatos próprios"
    - "cancelamento explícito de jobs queued sem artefatos de execução"
    - "re-run explícito de runs terminals com novo run_id e rastreabilidade da origem"
    - "inspeção individual de run com status, eventos, log e artefatos"
    - "reabertura da UI e reinspeção lendo a fila persistida localmente"
  exit_criteria:
    - "jobs isolados"
    - "status por run"
    - "logs e artefatos"
phase_4:
  target: "Profundidade do engine Julia"
  exit_criteria:
    - "métricas de rota fortes"
    - "viabilidade robusta"
phase_5:
  target: "UI de decisão humana"
  exit_criteria:
    - "comparação lado a lado"
    - "explicabilidade do vencedor"
    - "render 2D útil"
phase_6:
  target: "Polimento e estabilização"
  exit_criteria:
    - "bugs críticos resolvidos"
    - "testes/execução documentados"
    - "harden final"
